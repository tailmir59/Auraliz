<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Auraliz</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0a0e1a;
  color: #e0e6f0;
  font-family: 'Segoe UI', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

header {
  width: 100%;
  padding: 16px 40px;
  display: flex;
  justify-content: center;
  align-items: center;
  background: rgba(10,14,26,0.97);
  border-bottom: 1px solid rgba(0,200,220,0.15);
}

.logo {
  font-size: 2rem;
  font-weight: 700;
  letter-spacing: 4px;
  background: linear-gradient(90deg, #00c8dc, #00e8a0);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.layout {
  display: flex;
  flex: 1;
  width: 100%;
  flex-wrap: wrap;
}

.lado-izquierdo {
  width: 42%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 30px 20px;
  border-right: 1px solid rgba(0,200,220,0.1);
}

.avatar-container {
  position: relative;
  width: 260px;
  height: 360px;
  margin-bottom: 28px;
}

.avatar-ring {
  position: absolute;
  inset: -10px;
  border-radius: 22px;
  border: 2px solid transparent;
  transition: all 0.5s;
}

.avatar-ring.active {
  border-color: rgba(0,200,220,0.5);
  box-shadow: 0 0 28px rgba(0,200,220,0.25), 0 0 55px rgba(0,200,220,0.08);
  animation: latido 2s ease-in-out infinite;
}

@keyframes latido {
  0%, 100% { transform: scale(1); opacity: 0.7; }
  50% { transform: scale(1.03); opacity: 1; }
}

.avatar {
  width: 260px;
  height: 360px;
  border-radius: 20px;
  background: linear-gradient(160deg, #1a2540, #0d1528);
  border: 1px solid rgba(0,200,220,0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 8rem;
  overflow: hidden;
}

.btn-expandir {
  position: absolute;
  top: 10px;
  right: 10px;
  background: rgba(0,200,220,0.15);
  border: 1px solid rgba(0,200,220,0.3);
  color: #00c8dc;
  width: 32px;
  height: 32px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 1rem;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s;
  z-index: 10;
}

.btn-expandir:hover {
  background: rgba(0,200,220,0.3);
  transform: scale(1.1);
}

.btn-reproducir-wrap {
  width: 100%;
  display: flex;
  justify-content: center;
  margin-bottom: 30px;
}

.btn-fila {
  display: flex;
  gap: 40px;
  justify-content: center;
  width: 100%;
}

.btn {
  padding: 12px 22px;
  border-radius: 25px;
  border: none;
  cursor: pointer;
  font-size: 0.95rem;
  font-weight: 600;
  letter-spacing: 0.5px;
  transition: all 0.3s;
}

.btn-primary {
  background: linear-gradient(135deg, #00c8dc, #00e8a0);
  color: #0a0e1a;
  min-width: 190px;
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(0,200,220,0.4);
}

.btn-primary.activo {
  background: linear-gradient(135deg, #00a8bc, #00c880);
  box-shadow: 0 0 18px rgba(0,200,220,0.45);
}

.btn-secondary {
  background: rgba(0,200,220,0.07);
  color: #00c8dc;
  border: 1px solid rgba(0,200,220,0.25);
  min-width: 120px;
}

.btn-secondary:hover {
  background: rgba(0,200,220,0.14);
  transform: translateY(-2px);
}

.lado-derecho {
  width: 58%;
  display: flex;
  flex-direction: column;
  padding: 28px 30px;
  gap: 22px;
  overflow-y: auto;
}

.ajustes-panel {
  background: #111827;
  border-radius: 16px;
  padding: 20px 24px;
  border: 1px solid rgba(0,200,220,0.12);
  flex-shrink: 0;
  width: 100%;
}

.ajustes-titulo {
  font-size: 0.78rem;
  font-weight: 700;
  color: rgba(0,200,220,0.6);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 16px;
}

.ajuste-fila {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}

.ajuste-fila:last-child { border-bottom: none; }

.ajuste-label { font-size: 0.88rem; color: #8a9ab8; }

.ajuste-control { display: flex; align-items: center; gap: 10px; }

input[type=range] {
  -webkit-appearance: none;
  width: 110px;
  height: 4px;
  background: rgba(0,200,220,0.18);
  border-radius: 2px;
  outline: none;
}

input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 15px;
  height: 15px;
  border-radius: 50%;
  background: linear-gradient(135deg, #00c8dc, #00e8a0);
  cursor: pointer;
}

.valor-rango {
  font-size: 0.82rem;
  color: #00c8dc;
  min-width: 32px;
  text-align: right;
}

select {
  background: #1a2540;
  color: #e0e6f0;
  border: 1px solid rgba(0,200,220,0.25);
  padding: 5px 10px;
  border-radius: 8px;
  font-size: 0.88rem;
  outline: none;
  cursor: pointer;
}

.toggle {
  width: 44px;
  height: 22px;
  background: rgba(0,200,220,0.15);
  border-radius: 11px;
  position: relative;
  cursor: pointer;
  transition: background 0.3s;
  border: 1px solid rgba(0,200,220,0.25);
}

.toggle.on { background: linear-gradient(135deg, #00c8dc, #00e8a0); }

.toggle::after {
  content: '';
  position: absolute;
  top: 3px;
  left: 3px;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: white;
  transition: left 0.3s;
}

.toggle.on::after { left: 25px; }
.text-card {
  background: #111827;
  border-radius: 16px;
  padding: 24px;
  position: relative;
  border: 1px solid rgba(0,200,220,0.15);
  flex: 1;
  min-height: 220px;
  max-height: 420px;
  overflow-y: auto;
  transition: all 0.4s;
  width: 100%;
}

.text-card::-webkit-scrollbar { width: 6px; }

.text-card::-webkit-scrollbar-track {
  background: rgba(0,200,220,0.05);
  border-radius: 3px;
}

.text-card::-webkit-scrollbar-thumb {
  background: rgba(0,200,220,0.3);
  border-radius: 3px;
}

.text-card::-webkit-scrollbar-thumb:hover {
  background: rgba(0,200,220,0.5);
}

.text-card.leyendo {
  border-color: rgba(0,200,220,0.45);
  box-shadow: 0 0 20px rgba(0,200,220,0.07);
}

.badge-leyendo {
  position: absolute;
  top: 12px;
  left: 14px;
  background: rgba(0,200,220,0.12);
  border: 1px solid rgba(0,200,220,0.35);
  color: #00c8dc;
  font-size: 0.7rem;
  padding: 3px 10px;
  border-radius: 20px;
  display: none;
  align-items: center;
  gap: 5px;
}

.badge-leyendo.visible { display: flex; }

.badge-punto {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #00c8dc;
  animation: parpadeo 1.2s ease-in-out infinite;
}

@keyframes parpadeo {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.2; }
}

.texto-contenido {
  margin-top: 14px;
  font-size: 1rem;
  line-height: 1.8;
  color: #c8d4e8;
}

.btn-borrar-texto {
  position: absolute;
  top: 10px;
  right: 14px;
  background: rgba(220,50,50,0.1);
  border: 1px solid rgba(220,50,50,0.3);
  color: rgba(220,100,100,0.8);
  width: 28px;
  height: 28px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.85rem;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s;
  z-index: 5;
}

.btn-borrar-texto:hover {
  background: rgba(220,50,50,0.25);
  color: #ff6b6b;
}

/* PANTALLA COMPLETA */
.fullscreen-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 200;
  align-items: center;
  justify-content: center;
}

.fullscreen-overlay.visible { display: flex; }

.fs-avatar {
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
  border-radius: 0;
  border: none;
  background: linear-gradient(160deg, #1a2540, #0d1528);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22rem;
  overflow: hidden;
  z-index: 201;
}

.fs-avatar-ring { display: none; }

.btn-cerrar-fs {
  position: fixed;
  top: 20px;
  right: 24px;
  background: rgba(0,200,220,0.1);
  border: 1px solid rgba(0,200,220,0.3);
  color: #00c8dc;
  width: 38px;
  height: 38px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 1rem;
  z-index: 203;
  transition: all 0.3s;
}

.btn-cerrar-fs:hover {
  background: rgba(0,200,220,0.25);
  transform: scale(1.1);
}

.fs-controles {
  position: fixed;
  bottom: 40px;
  right: 40px;
  display: flex;
  justify-content: center;
  opacity: 0.4;
  transition: opacity 0.3s;
  z-index: 202;
}

.fs-controles:hover { opacity: 1; }

.fs-btn { min-width: 200px; }

/* MODAL VOZ */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 300;
  align-items: center;
  justify-content: center;
}

.modal-overlay.visible { display: flex; }

.modal {
  background: #111827;
  border: 1px solid rgba(0,200,220,0.3);
  border-radius: 16px;
  padding: 28px;
  width: 300px;
  box-shadow: 0 0 40px rgba(0,200,220,0.15);
}

.modal-titulo {
  font-size: 1rem;
  font-weight: 700;
  color: #00c8dc;
  margin-bottom: 18px;
}

.voz-opcion {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 11px;
  border-radius: 10px;
  cursor: pointer;
  transition: background 0.2s;
  margin-bottom: 6px;
  border: 1px solid transparent;
}

.voz-opcion:hover { background: rgba(0,200,220,0.07); }

.voz-opcion.activa {
  background: rgba(0,200,220,0.1);
  border-color: rgba(0,200,220,0.3);
}

.voz-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: rgba(0,200,220,0.25);
  border: 2px solid rgba(0,200,220,0.4);
}

.voz-opcion.activa .voz-dot { background: #00c8dc; }

.modal-cerrar {
  margin-top: 16px;
  width: 100%;
  padding: 10px;
  background: linear-gradient(135deg, #00c8dc, #00e8a0);
  color: #0a0e1a;
  border: none;
  border-radius: 10px;
  font-weight: 600;
  cursor: pointer;
  font-size: 0.92rem;
}

/* RESPONSIVE MÓVIL */
@media (max-width: 600px) {
  .layout {
    flex-direction: column;
    height: auto;
  }
  .lado-izquierdo {
    width: 100vw;
    border-right: none;
    border-bottom: 1px solid rgba(0,200,220,0.1);
    align-items: center;
    padding: 20px;
    box-sizing: border-box;
  }
  .lado-derecho {
    width: 100vw;
    padding: 16px;
    box-sizing: border-box;
  }
  .ajustes-panel {
    width: 100%;
    box-sizing: border-box;
  }
  .text-card {
    width: 100%;
    box-sizing: border-box;
    min-height: 150px;
    max-height: 280px;
  }
  .ajuste-fila {
    flex-wrap: wrap;
    gap: 6px;
  }
  input[type=range] {
    width: 150px;
  }
  select {
    max-width: 150px;
  }
  .btn-primary {
    min-width: unset;
    width: 85%;
  }
  .btn-secondary {
    min-width: 100px;
  }
  .avatar-container {
    width: 180px;
    height: 240px;
  }
  .avatar {
    width: 180px;
    height: 240px;
    font-size: 6rem;
  }
}
</style>
</head>
<body>
<header>
  <div class="logo">Auraliz</div>
</header>

<div class="layout">

  <div class="lado-izquierdo">
    <div class="btn-reproducir-wrap">
      <button class="btn btn-primary" id="btnReproducir" onclick="toggleReproducir()">▶ Reproducir</button>
    </div>
    <div class="avatar-container">
      <div class="avatar-ring" id="avatarRing"></div>
      <div class="avatar">👩</div>
      <button class="btn-expandir" onclick="abrirPantallaCompleta()" title="Pantalla completa">⛶</button>
    </div>
    <div class="btn-fila">
      <button class="btn btn-secondary" id="btnArchivo">📂 Archivo</button>
      <button class="btn btn-secondary" onclick="abrirModalVoz()">🎙 Voz</button>
    </div>
  </div>

  <div class="lado-derecho">
    <div class="ajustes-panel">
      <div class="ajustes-titulo">Ajustes</div>
      <div class="ajuste-fila">
        <span class="ajuste-label">Velocidad</span>
        <div class="ajuste-control">
          <input type="range" min="0.5" max="2" step="0.1" value="1" oninput="document.getElementById('valVel').textContent=parseFloat(this.value).toFixed(1)+'x'">
          <span class="valor-rango" id="valVel">1.0x</span>
        </div>
      </div>
      <div class="ajuste-fila">
        <span class="ajuste-label">Tono</span>
        <div class="ajuste-control">
          <input type="range" min="0.5" max="2" step="0.1" value="1" oninput="document.getElementById('valTono').textContent=parseFloat(this.value).toFixed(1)">
          <span class="valor-rango" id="valTono">1.0</span>
        </div>
      </div>
      <div class="ajuste-fila">
        <span class="ajuste-label">Voz</span>
        <div class="ajuste-control">
          <select id="selectVoz"></select>
        </div>
      </div>
      <div class="ajuste-fila">
        <span class="ajuste-label">Tema oscuro</span>
        <div class="ajuste-control">
          <div class="toggle on" onclick="this.classList.toggle('on')"></div>
        </div>
      </div>
    </div>

    <div class="text-card" id="textCard">
      <button class="btn-borrar-texto" onclick="borrarTexto()" title="Borrar texto">✕</button>
      <div class="badge-leyendo" id="badgeLeyendo">
        <div class="badge-punto"></div>
        Leyendo...
      </div>
      <div class="texto-contenido" id="textoContenido">
        Carga un documento para comenzar, o pulsa Reproducir para escuchar el texto de ejemplo.
      </div>
    </div>
  </div>

</div>

<!-- MODO PANTALLA COMPLETA -->
<div class="fullscreen-overlay" id="modo-fullscreen">
  <button class="btn-cerrar-fs" onclick="cerrarPantallaCompleta()">✕</button>
  <div class="fs-avatar-ring" id="fsRing"></div>
  <div class="fs-avatar">👩</div>
  <div class="fs-controles">
    <button class="btn btn-primary fs-btn" id="btnReproducirFS" onclick="toggleReproducir()">▶ Reproducir</button>
  </div>
</div>

<!-- MODAL VOZ -->
<div class="modal-overlay" id="modalVoz">
  <div class="modal">
    <div class="modal-titulo">Selecciona una voz</div>
    <div class="voz-opcion activa"><div class="voz-dot"></div> Mujer natural</div>
    <div class="voz-opcion"><div class="voz-dot"></div> Mujer formal</div>
    <div class="voz-opcion"><div class="voz-dot"></div> Hombre natural</div>
    <button class="modal-cerrar" onclick="cerrarModalVoz()">Confirmar</button>
  </div>
</div>
<script>
document.addEventListener('touchstart', function() {
  if (window.speechSynthesis.paused) {
    window.speechSynthesis.resume();
  }
}, { once: true });
let synth = window.speechSynthesis;
let utterance = null;
let leyendo = false;
let vocesDisponibles = [];

function cargarVoces() {
  vocesDisponibles = synth.getVoices().filter(v => v.lang.startsWith('es') && !v.name.toLowerCase().includes('google'));
  const select = document.getElementById('selectVoz');
  select.innerHTML = '';
  vocesDisponibles.forEach((voz, i) => {
    const option = document.createElement('option');
    option.value = i;
    option.textContent = voz.name;
    select.appendChild(option);
  });
}

window.speechSynthesis.onvoiceschanged = cargarVoces;
cargarVoces();

document.getElementById('btnArchivo').addEventListener('click', function() {
  synth.cancel();
  leyendo = false;
  resetBotones();

  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.txt,.pdf,.doc,.docx';

  input.addEventListener('change', function(e) {
    const archivo = e.target.files[0];
    if (!archivo) return;
    const nombre = archivo.name.toLowerCase();

    if (nombre.endsWith('.txt')) {
      const reader = new FileReader();
      reader.onload = function(ev) { mostrarTexto(ev.target.result); };
      reader.readAsText(archivo);
    } else if (nombre.endsWith('.pdf')) {
      const reader = new FileReader();
      reader.onload = function(ev) {
        const script = document.createElement('script');
        script.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
        script.onload = function() {
          pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
          const typedarray = new Uint8Array(ev.target.result);
          pdfjsLib.getDocument(typedarray).promise.then(function(pdf) {
            let textoCompleto = '';
            const paginas = [];
            for (let i = 1; i <= pdf.numPages; i++) {
              paginas.push(pdf.getPage(i).then(function(page) {
                return page.getTextContent().then(function(content) {
                  textoCompleto += content.items.map(function(item) { return item.str; }).join(' ') + ' ';
                });
              }));
            }
            Promise.all(paginas).then(function() { mostrarTexto(textoCompleto); });
          });
        };
        document.head.appendChild(script);
      };
      reader.readAsArrayBuffer(archivo);
    } else if (nombre.endsWith('.doc') || nombre.endsWith('.docx')) {
      const reader = new FileReader();
      reader.onload = function(ev) {
        const script = document.createElement('script');
        script.src = 'https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js';
        script.onload = function() {
          mammoth.extractRawText({ arrayBuffer: ev.target.result }).then(function(result) {
            mostrarTexto(result.value);
          });
        };
        document.head.appendChild(script);
      };
      reader.readAsArrayBuffer(archivo);
    } else {
      alert('Formato no compatible. Usa .txt, .pdf, .doc o .docx');
    }
  });

  input.click();
});

function toggleReproducir() {
  const btn = document.getElementById('btnReproducir');
  const btnFS = document.getElementById('btnReproducirFS');
  const tarjeta = document.getElementById('textCard');
  const badge = document.getElementById('badgeLeyendo');
  const ring = document.getElementById('avatarRing');
  const texto = document.getElementById('textoContenido').textContent.trim();
  const velocidad = parseFloat(document.querySelectorAll('input[type=range]')[0].value);
  const tono = parseFloat(document.querySelectorAll('input[type=range]')[1].value);
  const selectVoz = document.getElementById('selectVoz');
  const vozSeleccionada = vocesDisponibles[selectVoz.value];

  if (leyendo) {
    synth.cancel();
    leyendo = false;
    btn.classList.remove('activo');
    btnFS.classList.remove('activo');
    btn.innerHTML = '▶ Reproducir';
    btnFS.innerHTML = '▶ Reproducir';
    tarjeta.classList.remove('leyendo');
    badge.classList.remove('visible');
    ring.classList.remove('active');
  } else {
    if (!texto || texto === 'Carga un documento para comenzar, o pulsa Reproducir para escuchar el texto de ejemplo.') {
      alert('Carga primero un documento para leer.');
      return;
    }
    utterance = new SpeechSynthesisUtterance(texto);
    utterance.lang = 'es-ES';
    utterance.rate = velocidad;
    utterance.pitch = tono;
    if (vozSeleccionada) utterance.voice = vozSeleccionada;

    utterance.onend = function() {
      leyendo = false;
      btn.classList.remove('activo');
      btnFS.classList.remove('activo');
      btn.innerHTML = '▶ Reproducir';
      btnFS.innerHTML = '▶ Reproducir';
      tarjeta.classList.remove('leyendo');
      badge.classList.remove('visible');
      ring.classList.remove('active');
    };

    synth.speak(utterance);
    leyendo = true;
    btn.classList.add('activo');
    btnFS.classList.add('activo');
    btn.innerHTML = '⏸ Pausar';
    btnFS.innerHTML = '⏸ Pausar';
    tarjeta.classList.add('leyendo');
    badge.classList.add('visible');
    ring.classList.add('active');
  }
}

function mostrarTexto(texto) {
  const contenido = document.getElementById('textoContenido');
  contenido.style.opacity = '0';
  contenido.textContent = texto.trim();
  contenido.style.transition = 'opacity 0.5s';
  contenido.style.opacity = '1';
  iniciarLectura();
}

function borrarTexto() {
  synth.cancel();
  leyendo = false;
  resetBotones();
  const contenido = document.getElementById('textoContenido');
  contenido.style.opacity = '0';
  setTimeout(function() {
    contenido.textContent = 'Carga un documento para comenzar, o pulsa Reproducir para escuchar el texto de ejemplo.';
    contenido.style.transition = 'opacity 0.5s';
    contenido.style.opacity = '1';
  }, 400);
}

function resetBotones() {
  document.getElementById('btnReproducir').classList.remove('activo');
  document.getElementById('btnReproducirFS').classList.remove('activo');
  document.getElementById('btnReproducir').innerHTML = '▶ Reproducir';
  document.getElementById('btnReproducirFS').innerHTML = '▶ Reproducir';
  document.getElementById('textCard').classList.remove('leyendo');
  document.getElementById('badgeLeyendo').classList.remove('visible');
  document.getElementById('avatarRing').classList.remove('active');
}

function abrirModalVoz() {
  document.getElementById('modalVoz').classList.add('visible');
}

function cerrarModalVoz() {
  document.getElementById('modalVoz').classList.remove('visible');
}

function abrirPantallaCompleta() {
  document.getElementById('modo-fullscreen').classList.add('visible');
}

function cerrarPantallaCompleta() {
  document.getElementById('modo-fullscreen').classList.remove('visible');
}

document.querySelectorAll('.voz-opcion').forEach(function(opcion) {
  opcion.addEventListener('click', function() {
    document.querySelectorAll('.voz-opcion').forEach(function(o) { o.classList.remove('activa'); });
    opcion.classList.add('activa');
  });
});
</script>
</body>
